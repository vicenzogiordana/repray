app = "prayer-app"
primary_region = "iad"

[build]

[deploy]
  release_command = "/bin/sh /app/bin/migrate"

[env]
  PHX_HOST = "prayer-app.fly.dev"
  PHX_SERVER = "true"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"